<!DOCTYPE html>
<html>
<head>
    <title>Заметки</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial;
            text-align: center;
        }
        header {
            background-color: #333;
            color: white;
            padding: 15px;
            font-size: 24px;
        }
        .note {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<header>
    Мои заметки
</header>

<h2>Добавить заметку</h2>

<form method="post">
    <input type="text" name="text" placeholder="Текст заметки" required>
    <br><br>
    <label>
        <input type="checkbox" name="important">
        Важная
    </label>
    <br><br>
    <button type="submit">Добавить</button>
</form>

<h2>Список заметок</h2>

{% for note in notes %}
<div class="note">
    {% if note.important %}
        <b>{{ note.text }}</b>
    {% else %}
        {{ note.text }}
    {% endif %}
</div>
{% endfor %}

</body>
</html>
